# ========================================
# APLICACION
# ========================================
spring.application.name=gestion-inventario
spring.application.version=1.0.0
spring.main.banner-mode=console

# ========================================
# BASE DE DATOS
# ========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================================
# JPA / HIBERNATE
# ========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.default_schema=farmacia
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.fetch_size=100
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ========================================
# LOGGING
# ========================================
logging.level.root=WARN
logging.level.com.farmacia.cristoredentor=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{HH:mm:ss} [%-5level] %msg%n
logging.level.org.springframework.boot.web.embedded.tomcat=INFO

# ========================================
# ACTUADOR
# ========================================
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=ALWAYS
management.endpoint.health.show-components=ALWAYS
management.endpoint.shutdown.enabled=false

# ========================================
# CORS
# ========================================
spring.mvc.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}
spring.mvc.cors.allowed-headers=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.mvc.cors.allow-credentials=true
spring.mvc.cors.max-age=3600

# ========================================
# VALIDACION
# ========================================
spring.validation.enabled=true

# ========================================
# PDF
# ========================================
spring.pdf.settings.default.font-family=Helvetica

# ========================================
# JWT
# ========================================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}